<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <title>Project Details</title>
  </head>
  <body>
    <header class="py-3 shadow-sm border-bottom bg-body-tertiary sticky-top">
      <div class="container d-flex justify-content-between align-items-center">
        <a
          href="index.html"
          class="text-decoration-none text-body fw-bold fs-5"
        >
          <i class="bi bi-house-door me-2"></i
          ><span data-i18n="projects.details.toHome">На головну</span>
        </a>
        <button
          class="btn btn-primary btn-sm"
          data-bs-toggle="modal"
          data-bs-target="#contactModal"
        >
          <i class="bi bi-envelope"></i>
        </button>
      </div>
    </header>

    <main class="py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-10">
            <div
              class="d-md-flex justify-content-between align-items-center mb-5"
            >
              <h1 id="projTitle" class="display-3 fw-bold mb-0"></h1>
              <div class="mt-3 mt-md-0 d-flex gap-2">
                <a
                  id="linkLive"
                  href="#"
                  target="_blank"
                  class="btn btn-primary rounded-pill px-4"
                  ><i class="bi bi-play-circle me-2"></i>Demo</a
                >
                <a
                  id="linkCode"
                  href="#"
                  target="_blank"
                  class="btn btn-outline-primary rounded-pill px-4"
                  ><i class="bi bi-github me-2"></i>Code</a
                >
              </div>
            </div>

            <div
              class="project-img-container mb-5 shadow-lg rounded-4 overflow-hidden"
              style="max-height: 500px; background: #2b3035"
            >
              <img
                id="projImg"
                src=""
                class="w-100 h-100 object-fit-cover"
                alt="Preview"
              />
            </div>

            <div class="row g-5">
              <div class="col-md-8">
                <section class="mb-5">
                  <h2
                    class="h3 fw-bold border-start border-4 border-primary ps-3 mb-3"
                    data-i18n="projects.details.goal"
                  >
                    Мета
                  </h2>
                  <p id="projGoal" class="lead text-muted"></p>
                </section>
                <section class="mb-5">
                  <h2
                    class="h3 fw-bold mb-3"
                    data-i18n="projects.details.problem"
                  >
                    Виклики
                  </h2>
                  <p id="projProblem"></p>
                  <hr class="my-4 opacity-25" />
                  <h2
                    class="h3 fw-bold mb-3"
                    data-i18n="projects.details.solution"
                  >
                    Рішення
                  </h2>
                  <p id="projSolution"></p>
                </section>
              </div>
              <div class="col-md-4">
                <div class="card bg-body-tertiary border-0 rounded-4 p-4 mb-4">
                  <h4 class="fw-bold mb-3" data-i18n="projects.details.tech">
                    Стек
                  </h4>
                  <div id="projTech" class="d-flex gap-2 flex-wrap"></div>
                </div>
                <div class="card bg-body-tertiary border-0 rounded-4 p-4">
                  <h4
                    class="fw-bold mb-3"
                    data-i18n="projects.details.features"
                  >
                    Функції
                  </h4>
                  <ul id="projFeatures" class="list-unstyled mb-0"></ul>
                </div>
              </div>
            </div>

            <section
              class="mt-5 p-5 bg-primary text-white rounded-4 shadow d-md-flex justify-content-between align-items-center"
            >
              <div class="mb-4 mb-md-0 pe-md-4">
                <h2
                  class="h3 fw-bold mb-2"
                  data-i18n="projects.details.feedback"
                >
                  Результати
                </h2>
                <p id="projFeedback" class="opacity-75 mb-0"></p>
              </div>
              <a
                href="projects.html"
                class="btn btn-light btn-lg rounded-pill px-5 fw-bold text-primary shadow-sm"
              >
                <i class="bi bi-grid-fill me-2"></i
                ><span data-i18n="projects.details.backToList"
                  >Всі проекти</span
                >
              </a>
            </section>
          </div>
        </div>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        // ФІКС ТЕМИ
        const savedTheme = localStorage.getItem("siteTheme") || "light";
        document.documentElement.setAttribute("data-bs-theme", savedTheme);

        const params = new URLSearchParams(window.location.search);
        const projectId = params.get("id");
        const lang = localStorage.getItem("siteLang") || "en";

        try {
          const response = await fetch("./lang/lang.json");
          const data = await response.json();
          const dict = data[lang];
          const project = dict["projects.list"][projectId];

          if (!project) {
            window.location.href = "projects.html";
            return;
          }

          document.getElementById("projTitle").textContent = project.title;
          document.getElementById("projGoal").textContent = project.goal;
          document.getElementById("projProblem").textContent = project.problem;
          document.getElementById("projSolution").textContent =
            project.solution;
          document.getElementById("projFeedback").textContent =
            project.feedback;
          document.getElementById("projImg").src =
            `./public/projects/${projectId}.png`;
          document.getElementById("linkLive").href = project.liveLink || "#";
          document.getElementById("linkCode").href = project.codeLink || "#";

          const fList = document.getElementById("projFeatures");
          fList.innerHTML = project.features
            .map(
              (f) =>
                `<li class="mb-2"><i class="bi bi-check-lg text-primary me-2"></i>${f}</li>`,
            )
            .join("");

          const tCont = document.getElementById("projTech");
          tCont.innerHTML = project.tech
            .map(
              (t) =>
                `<span class="badge bg-primary-subtle text-primary border border-primary-subtle px-3 py-2">${t}</span>`,
            )
            .join("");

          document.querySelectorAll("[data-i18n]").forEach((el) => {
            const key = el.dataset.i18n;
            if (dict[key]) el.textContent = dict[key];
          });
        } catch (e) {
          console.error("Помилка:", e);
        }
      });
    </script>
  </body>
</html>
