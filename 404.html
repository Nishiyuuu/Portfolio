<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <style>
      .error-container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 2rem;
      }
      .error-code {
        font-size: 8rem;
        font-weight: 900;
        background: linear-gradient(135deg, var(--bs-primary), #8bc34a);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        line-height: 1;
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body class="bg-body-tertiary">
    <div class="error-container">
      <i class="bi bi-bug text-muted" style="font-size: 4rem; opacity: 0.5"></i>
      <h1 class="error-code">404</h1>
      <h2 class="fw-bold mb-3">Page Not Found</h2>
      <p class="text-muted fs-5 mb-5 max-w-500">
        The page you are looking for doesn't exist, has been moved, or is
        temporarily unavailable.
      </p>

      <a href="/" class="btn btn-primary btn-lg rounded-pill px-5 shadow-sm">
        <i class="bi bi-house-door me-2"></i> Return Home
      </a>
    </div>

    <script>
      // Скрипт для збереження теми (світла/темна) з твого основного сайту
      document.addEventListener("DOMContentLoaded", () => {
        const savedTheme = localStorage.getItem("siteTheme") || "light";
        document.documentElement.setAttribute("data-bs-theme", savedTheme);
      });
    </script>
  </body>
</html>
